[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "zbar", "gcc", "pkg-config"]

[phases.install]
cmds = ["python3 -m pip install --upgrade pip", "python3 -m pip install -r requirements.txt"]

[start]
cmd = "gunicorn --worker-class eventlet --workers 1 --bind 0.0.0.0:$PORT wsgi:application"
