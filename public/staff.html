<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D2 Staff | Operations Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-dark: #0f172a;
            --brand-primary: #06b6d4;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0b1121;
            color: white;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
        }

        .status-washing {
            background: rgba(6, 182, 212, 0.1);
            color: #06b6d4;
        }

        .status-completed {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        /* AUTH TRANSITION OVERLAY */
        #auth-transition-overlay {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: #0b1121;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        #auth-transition-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .auth-scan-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: var(--brand-primary);
            box-shadow: 0 0 20px var(--brand-primary);
            top: -10%;
            left: 0;
            opacity: 0;
            z-index: 10001;
        }

        .active .auth-scan-line {
            animation: authScan 1.5s ease-in-out infinite;
            opacity: 0.6;
        }

        @keyframes authScan {
            0% {
                top: -10%;
            }

            100% {
                top: 110%;
            }
        }

        .auth-glitch-text {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: white;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
        }

        .power-down {
            animation: powerDown 1.2s forwards;
        }

        @keyframes powerDown {
            0% {
                transform: scaleY(1) scaleX(1);
                filter: brightness(1);
            }

            40% {
                transform: scaleY(0.005) scaleX(1.1);
                filter: brightness(2);
            }

            100% {
                transform: scaleY(0.005) scaleX(0);
                filter: brightness(5);
                opacity: 0;
            }
        }
    </style>
</head>

<body class="p-6">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-2xl font-bold">Staff Operations</h1>
                <p class="text-slate-500 text-sm">Managing live orders & stations</p>
            </div>
            <button onclick="logout()"
                class="bg-red-500/10 border border-red-500/20 text-red-400 px-4 py-2 rounded-xl text-xs font-bold hover:bg-red-500 hover:text-white transition-all flex items-center gap-2 group shadow-lg shadow-red-500/5">
                <i class="fa-solid fa-power-off group-hover:rotate-12 transition-transform"></i> Logout
            </button>
        </header>

        <div class="grid lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 glass-card p-6">
                <h2 class="text-lg font-bold mb-6">Active Jobs</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="text-slate-500 uppercase text-[10px] tracking-widest border-b border-white/5">
                            <tr>
                                <th class="pb-4">Customer</th>
                                <th class="pb-4">Vehicle</th>
                                <th class="pb-4">Package</th>
                                <th class="pb-4">Status</th>
                                <th class="pb-4">Action</th>
                            </tr>
                        </thead>
                        <tbody id="jobs-list">
                            <!-- Jobs via JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="glass-card p-6 h-fit">
                <h2 class="text-lg font-bold mb-4">Shop Status</h2>
                <div class="p-4 bg-white/5 rounded-xl border border-white/5 mb-4">
                    <p class="text-xs text-slate-400 mb-2">Toggle Main Station</p>
                    <input type="text" id="v-input" placeholder="Current Vehicle"
                        class="w-full bg-black/20 border border-white/10 p-2 rounded mb-3 text-xs outline-none focus:border-brand-primary">
                    <div class="flex gap-2">
                        <button onclick="setStatus(true)"
                            class="flex-1 py-2 text-xs font-bold rounded bg-red-400/10 text-red-500 border border-red-500/20">BUSY</button>
                        <button onclick="setStatus(false)"
                            class="flex-1 py-2 text-xs font-bold rounded bg-green-400/10 text-green-500 border border-green-500/20">FREE</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadJobs();
        });

        async function checkAuth() {
            try {
                const res = await fetch('/api/check-auth');
                const data = await res.json();
                if (!data.authenticated || (data.user.role !== 'staff' && data.user.role !== 'admin')) {
                    window.location.href = '/index.html';
                }
            } catch (e) {
                window.location.href = '/index.html';
            }
        }

        async function loadJobs() {
            try {
                const res = await fetch('/api/admin/bookings');
                const data = await res.json();
                const list = document.getElementById('jobs-list');
                list.innerHTML = '';

                data.slice(0, 15).forEach(b => {
                    const tr = document.createElement('tr');
                    tr.className = "border-b border-white/5";
                    tr.innerHTML = `
                        <td class="py-4 font-bold text-slate-300">${b.customer_name}</td>
                        <td class="py-4 font-mono text-xs uppercase text-brand-primary">${b.vehicle_number || 'N/A'}</td>
                        <td class="py-4 text-xs">${b.service_package}</td>
                        <td class="py-4"><span class="status-badge status-${b.status.toLowerCase()}">${b.status}</span></td>
                        <td class="py-4">
                            <select onchange="updateJob(${b.id}, this.value)" class="bg-slate-800 text-[10px] border border-white/10 rounded">
                                <option value="" disabled selected>Update</option>
                                <option value="Washing">Washing</option>
                                <option value="Drying">Drying</option>
                                <option value="Completed">Complete</option>
                            </select>
                        </td>
                    `;
                    list.appendChild(tr);
                });
            } catch (e) { }
        }

        async function updateJob(id, status) {
            await fetch('/api/admin/booking/status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, status })
            });
            loadJobs();
        }

        async function setStatus(busy) {
            const v = document.getElementById('v-input').value;
            await fetch('/api/admin/status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ is_busy: busy, current_vehicle: busy ? v : '' })
            });
            alert("Shop status updated");
        }

        async function logout() {
            showAuthTransition('logout', 'Powering Down', async () => {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/index.html';
            });
        }

        function showAuthTransition(type, message, callback) {
            let overlay = document.getElementById('auth-transition-overlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'auth-transition-overlay';
                overlay.innerHTML = `<div class="auth-scan-line"></div><div class="auth-glitch-text">${message}</div>`;
                document.body.appendChild(overlay);
            }
            const textEl = overlay.querySelector('.auth-glitch-text');
            textEl.className = 'auth-glitch-text ' + (type === 'login' ? 'access-granted' : 'power-down');
            overlay.classList.add('active');
            setTimeout(() => { if (callback) callback(); }, 1200);
        }
    </script>
</body>

</html>
